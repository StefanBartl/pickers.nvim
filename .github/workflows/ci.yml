name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  # Gating: stylua + luacheck must pass. docs/BINDINGS.lua is excluded from stylua
  # (aligned reference data, see .styluaignore).
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: stylua (check)
        uses: JohnnyMorganz/stylua-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          version: latest
          args: --check lua plugin docs/TESTS

      - name: Install luacheck
        run: sudo apt-get update && sudo apt-get install -y luarocks && sudo luarocks install luacheck

      - name: luacheck
        run: luacheck lua plugin docs/TESTS

  # Real gate: the framework-free unit suite. lib.nvim is checked out as a
  # sibling so the command.complete tests run too (they need lib.nvim.notify).
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout pickers.nvim
        uses: actions/checkout@v4
        with:
          path: pickers.nvim

      - name: Checkout lib.nvim
        uses: actions/checkout@v4
        with:
          repository: StefanBartl/lib.nvim
          path: lib.nvim

      - name: Install Neovim (stable)
        uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: stable

      - name: Run tests
        working-directory: pickers.nvim
        env:
          REPOS_DIR: ${{ github.workspace }}
        run: nvim -l docs/TESTS/pickers_spec.lua
